<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PaneLink Display</title>
    <style>
      :root {
        color: #ffffff;
        background: #05080c;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-synthesis: none;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-width: 0;
        overflow: hidden;
        background: #05080c;
      }

      main {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      .grid {
        position: absolute;
        inset: 22px;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }

      .grid.one {
        grid-template-columns: 1fr;
      }

      .grid.three {
        grid-template-columns: 1.2fr 0.8fr;
      }

      .screen {
        position: relative;
        min-height: 140px;
        border: 1px solid rgba(142, 188, 255, 0.28);
        border-radius: 8px;
        overflow: hidden;
        background:
          repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.035) 0 1px, transparent 1px 12px),
          linear-gradient(135deg, rgba(42, 100, 160, 0.72), rgba(12, 22, 34, 0.92));
        padding: 22px;
      }

      .screen img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: #000;
      }

      .screen .label {
        position: relative;
        z-index: 1;
        display: inline-grid;
        gap: 4px;
        border-radius: 8px;
        background: rgba(5, 9, 14, 0.72);
        padding: 9px 10px;
      }

      .screen:first-child {
        grid-row: span 2;
      }

      .grid.one .screen:first-child {
        grid-row: auto;
      }

      .screen strong,
      .screen small {
        display: block;
      }

      .screen small {
        color: rgba(255, 255, 255, 0.55);
        margin-top: 6px;
      }

      .status {
        position: absolute;
        left: 50%;
        bottom: 32px;
        width: min(500px, calc(100% - 44px));
        transform: translateX(-50%);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        background: rgba(5, 9, 14, 0.92);
        display: grid;
        place-items: center;
        gap: 8px;
        padding: 18px;
        text-align: center;
      }

      .status strong {
        font-size: 18px;
      }

      .status span,
      .status small {
        color: #b9c7d5;
      }

      button {
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
        min-height: 36px;
        padding: 0 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="grid one" id="grid"></section>
      <div class="status">
        <strong id="status-title">Live frame receiver</strong>
        <span id="peer">PaneLink Display</span>
        <small id="frame-url">Frames worden geladen.</small>
        <button type="button" id="close">Sluit display</button>
      </div>
    </main>
    <script>
      function readConfig() {
        const params = new URLSearchParams(window.location.search);
        if (params.get("window") === "display") {
          return {
            peerId: params.get("peerId") || "unknown",
            peerAddress: params.get("peerAddress") || "",
            screenCount: Number(params.get("screens") || 1),
            quality: params.get("quality") || "Low latency",
          };
        }

        try {
          return JSON.parse(localStorage.getItem("panelink.displayWindow") || "{}");
        } catch {
          return {};
        }
      }

      let activeFrameUrl = "";
      let activeCount = 0;
      const timers = new Map();

      function render() {
        const config = readConfig();
        const count = Math.max(1, Math.min(Number(config.screenCount || 1), 3));
        const frameUrl = config.peerAddress || "";
        const grid = document.getElementById("grid");

        if (frameUrl === activeFrameUrl && count === activeCount) {
          document.getElementById("peer").textContent = `${config.peerId || "unknown"} - ${config.quality || "Low latency"}`;
          document.getElementById("frame-url").textContent = frameUrl || "Geen frame URL ontvangen.";
          return;
        }

        activeFrameUrl = frameUrl;
        activeCount = count;
        for (const timer of timers.values()) {
          clearTimeout(timer);
        }
        timers.clear();

        grid.className = `grid ${count === 1 ? "one" : count === 3 ? "three" : ""}`;
        grid.innerHTML = "";

        for (let index = 1; index <= count; index += 1) {
          const screen = document.createElement("div");
          screen.className = "screen";
          const img = document.createElement("img");
          img.alt = `PaneLink screen ${index}`;
          const schedule = (delay) => {
            if (!frameUrl) return;
            clearTimeout(timers.get(index));
            timers.set(index, setTimeout(() => {
              img.src = `${frameUrl}${frameUrl.includes("?") ? "&" : "?"}screen=${index}&t=${Date.now()}`;
            }, delay));
          };
          img.onload = () => {
            document.getElementById("status-title").textContent = "Live frame ontvangen";
            schedule(120);
          };
          img.onerror = () => {
            document.getElementById("status-title").textContent = "Nog geen frame bereikbaar";
            schedule(1000);
          };
          schedule(0);
          screen.appendChild(img);
          const label = document.createElement("div");
          label.className = "label";
          label.innerHTML = `<strong>Screen ${index}</strong><small>${frameUrl ? "Live frame polling" : "Geen frame URL"}</small>`;
          screen.appendChild(label);
          grid.appendChild(screen);
        }

        document.getElementById("peer").textContent = `${config.peerId || "unknown"} - ${config.quality || "Low latency"}`;
        document.getElementById("frame-url").textContent = frameUrl || "Geen frame URL ontvangen.";
      }

      document.getElementById("close").addEventListener("click", () => window.close());
      render();
      setInterval(render, 250);
    </script>
  </body>
</html>
