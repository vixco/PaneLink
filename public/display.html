<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PaneLink Display</title>
    <style>
      :root {
        color: #ffffff;
        background: #05080c;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-synthesis: none;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-width: 0;
        overflow: hidden;
        background: #05080c;
      }

      main {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      .grid {
        position: absolute;
        inset: 22px;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }

      .grid.one {
        grid-template-columns: 1fr;
      }

      .grid.three {
        grid-template-columns: 1.2fr 0.8fr;
      }

      .screen {
        min-height: 140px;
        border: 1px solid rgba(142, 188, 255, 0.28);
        border-radius: 8px;
        background:
          repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.035) 0 1px, transparent 1px 12px),
          linear-gradient(135deg, rgba(42, 100, 160, 0.72), rgba(12, 22, 34, 0.92));
        padding: 22px;
      }

      .screen:first-child {
        grid-row: span 2;
      }

      .grid.one .screen:first-child {
        grid-row: auto;
      }

      .screen strong,
      .screen small {
        display: block;
      }

      .screen small {
        color: rgba(255, 255, 255, 0.55);
        margin-top: 6px;
      }

      .status {
        position: absolute;
        left: 50%;
        bottom: 32px;
        width: min(500px, calc(100% - 44px));
        transform: translateX(-50%);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        background: rgba(5, 9, 14, 0.92);
        display: grid;
        place-items: center;
        gap: 8px;
        padding: 18px;
        text-align: center;
      }

      .status strong {
        font-size: 18px;
      }

      .status span,
      .status small {
        color: #b9c7d5;
      }

      button {
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
        min-height: 36px;
        padding: 0 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="grid one" id="grid"></section>
      <div class="status">
        <strong>Nog geen beeld ontvangen</strong>
        <span id="peer">PaneLink Display</span>
        <small>Native capture en frame transport zijn nog niet actief.</small>
        <button type="button" id="close">Sluit display</button>
      </div>
    </main>
    <script>
      function readConfig() {
        try {
          return JSON.parse(localStorage.getItem("panelink.displayWindow") || "{}");
        } catch {
          return {};
        }
      }

      function render() {
        const config = readConfig();
        const count = Math.max(1, Math.min(Number(config.screenCount || 1), 3));
        const grid = document.getElementById("grid");
        grid.className = `grid ${count === 1 ? "one" : count === 3 ? "three" : ""}`;
        grid.innerHTML = "";

        for (let index = 1; index <= count; index += 1) {
          const screen = document.createElement("div");
          screen.className = "screen";
          screen.innerHTML = `<strong>Screen ${index}</strong><small>Geen desktopframes</small>`;
          grid.appendChild(screen);
        }

        document.getElementById("peer").textContent = `${config.peerId || "unknown"} - ${config.quality || "Low latency"}`;
      }

      document.getElementById("close").addEventListener("click", () => window.close());
      render();
      setInterval(render, 1000);
    </script>
  </body>
</html>
