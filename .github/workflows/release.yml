name: Release

on:
  push:
    tags:
      - "v*"
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare-release:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      checkout-ref: ${{ steps.gate.outputs.checkout-ref }}
      should-release: ${{ steps.release.outputs.should-release || 'false' }}
      tag-name: ${{ steps.release.outputs.tag-name }}
    steps:
      - id: gate
        name: Gate release event
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
          WORKFLOW_RUN_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WORKFLOW_RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          checkout_ref="$GITHUB_SHA"
          if [ "$EVENT_NAME" = "workflow_run" ]; then
            checkout_ref="$WORKFLOW_RUN_SHA"
            if [ "$WORKFLOW_RUN_BRANCH" != "main" ] || [ "$WORKFLOW_RUN_CONCLUSION" != "success" ]; then
              echo "checkout-ref=$checkout_ref" >> "$GITHUB_OUTPUT"
              echo "should-continue=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          echo "checkout-ref=$checkout_ref" >> "$GITHUB_OUTPUT"
          echo "should-continue=true" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.gate.outputs.should-continue == 'true'
        with:
          ref: ${{ steps.gate.outputs.checkout-ref }}

      - id: release
        name: Resolve release tag
        if: steps.gate.outputs.should-continue == 'true'
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |

          if [ "$EVENT_NAME" = "push" ]; then
            tag_name="$REF_NAME"
          else
            version="$(node -p "require('./src-tauri/tauri.conf.json').version")"
            tag_name="v$version"
          fi

          if [ "$EVENT_NAME" != "push" ] && git ls-remote --exit-code --tags origin "refs/tags/$tag_name" >/dev/null 2>&1; then
            echo "Release tag $tag_name already exists; skipping automatic release."
            echo "should-release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should-release=true" >> "$GITHUB_OUTPUT"
          fi

          echo "tag-name=$tag_name" >> "$GITHUB_OUTPUT"

  publish-tauri:
    name: Build ${{ matrix.platform }}
    needs: prepare-release
    if: needs.prepare-release.outputs.should-release == 'true'
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.checkout-ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2

      - run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: "-"
        with:
          tagName: ${{ needs.prepare-release.outputs.tag-name }}
          releaseName: "PaneLink ${{ needs.prepare-release.outputs.tag-name }}"
          releaseBody: "Download PaneLink for Windows or macOS. Installed apps use the signed updater artifacts from this release."
          releaseDraft: true
          prerelease: false

  repair-updater-feed:
    name: Repair updater feed
    runs-on: ubuntu-latest
    needs: [prepare-release, publish-tauri]
    if: needs.prepare-release.outputs.should-release == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.checkout-ref }}

      - name: Download updater signatures
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p updater-feed
          gh release download "${{ needs.prepare-release.outputs.tag-name }}" \
            --repo "${{ github.repository }}" \
            --pattern "*.sig" \
            --dir updater-feed

      - name: Rebuild latest.json
        env:
          TAG_NAME: ${{ needs.prepare-release.outputs.tag-name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const version = process.env.TAG_NAME.replace(/^v/, '');
          const releaseBase = `https://github.com/${process.env.REPOSITORY}/releases/download/${process.env.TAG_NAME}`;
          const readSignature = (name) => fs.readFileSync(path.join('updater-feed', name), 'utf8').trim();

          const macSignature = readSignature('PaneLink_aarch64.app.tar.gz.sig');
          const windowsNsisSignature = readSignature(`PaneLink_${version}_x64-setup.exe.sig`);
          const windowsMsiSignature = readSignature(`PaneLink_${version}_x64_en-US.msi.sig`);

          const feed = {
            version,
            notes: 'Download PaneLink for Windows or macOS. Installed apps use the signed updater artifacts from this release.',
            pub_date: new Date().toISOString(),
            platforms: {
              'darwin-aarch64': {
                signature: macSignature,
                url: `${releaseBase}/PaneLink_aarch64.app.tar.gz`
              },
              'darwin-aarch64-app': {
                signature: macSignature,
                url: `${releaseBase}/PaneLink_aarch64.app.tar.gz`
              },
              'windows-x86_64': {
                signature: windowsNsisSignature,
                url: `${releaseBase}/PaneLink_${version}_x64-setup.exe`
              },
              'windows-x86_64-nsis': {
                signature: windowsNsisSignature,
                url: `${releaseBase}/PaneLink_${version}_x64-setup.exe`
              },
              'windows-x86_64-msi': {
                signature: windowsMsiSignature,
                url: `${releaseBase}/PaneLink_${version}_x64_en-US.msi`
              }
            }
          };

          fs.writeFileSync('updater-feed/latest.json', `${JSON.stringify(feed, null, 2)}\n`, 'utf8');
          NODE

      - name: Upload repaired latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.prepare-release.outputs.tag-name }}" updater-feed/latest.json --repo "${{ github.repository }}" --clobber

      - name: Publish complete release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ needs.prepare-release.outputs.tag-name }}" --repo "${{ github.repository }}" --draft=false --prerelease=false --latest
