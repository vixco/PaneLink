name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-tauri:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2

      - run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: "-"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "PaneLink ${{ github.ref_name }}"
          releaseBody: "Download PaneLink for Windows or macOS. Installed apps use the signed updater artifacts from this release."
          releaseDraft: true
          prerelease: false

  repair-updater-feed:
    name: Repair updater feed
    runs-on: ubuntu-latest
    needs: publish-tauri
    steps:
      - uses: actions/checkout@v4

      - name: Download updater signatures
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p updater-feed
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "*.sig" \
            --dir updater-feed

      - name: Rebuild latest.json
        env:
          TAG_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const version = process.env.TAG_NAME.replace(/^v/, '');
          const releaseBase = `https://github.com/${process.env.REPOSITORY}/releases/download/${process.env.TAG_NAME}`;
          const readSignature = (name) => fs.readFileSync(path.join('updater-feed', name), 'utf8').trim();

          const macSignature = readSignature('PaneLink_aarch64.app.tar.gz.sig');
          const windowsNsisSignature = readSignature(`PaneLink_${version}_x64-setup.exe.sig`);
          const windowsMsiSignature = readSignature(`PaneLink_${version}_x64_en-US.msi.sig`);

          const feed = {
            version,
            notes: 'Download PaneLink for Windows or macOS. Installed apps use the signed updater artifacts from this release.',
            pub_date: new Date().toISOString(),
            platforms: {
              'darwin-aarch64': {
                signature: macSignature,
                url: `${releaseBase}/PaneLink_aarch64.app.tar.gz`
              },
              'darwin-aarch64-app': {
                signature: macSignature,
                url: `${releaseBase}/PaneLink_aarch64.app.tar.gz`
              },
              'windows-x86_64': {
                signature: windowsNsisSignature,
                url: `${releaseBase}/PaneLink_${version}_x64-setup.exe`
              },
              'windows-x86_64-nsis': {
                signature: windowsNsisSignature,
                url: `${releaseBase}/PaneLink_${version}_x64-setup.exe`
              },
              'windows-x86_64-msi': {
                signature: windowsMsiSignature,
                url: `${releaseBase}/PaneLink_${version}_x64_en-US.msi`
              }
            }
          };

          fs.writeFileSync('updater-feed/latest.json', `${JSON.stringify(feed, null, 2)}\n`, 'utf8');
          NODE

      - name: Upload repaired latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" updater-feed/latest.json --repo "${{ github.repository }}" --clobber

      - name: Publish complete release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --repo "${{ github.repository }}" --draft=false --prerelease=false --latest
